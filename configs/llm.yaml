provider: openai_compatible
temperature: 0.0
max_tokens: 800
timeout: 30
max_retries: 1
retry_interval: 1
api_key_env: LLM_API_KEY
base_url_env: LLM_BASE_URL
model_env: LLM_MODEL

providers:
  mock:
    provider: mock
    model_env: LLM_MODEL

  openai_compatible:
    provider: openai_compatible
    api_key_env: LLM_API_KEY
    base_url_env: LLM_BASE_URL
    model_env: LLM_MODEL

  anthropic:
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY
    model_env: ANTHROPIC_MODEL

  local:
    provider: local
    base_url_env: LOCAL_LLM_BASE_URL
    model_env: LOCAL_LLM_MODEL
